<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torah Source Search</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Crimson Pro',Georgia,serif;background:#f5f0e8;color:#3b2a1a;min-height:100vh;padding:2rem 1rem}
.container{max-width:720px;margin:0 auto}
h1{text-align:center;font-size:2rem;margin-bottom:.25rem;color:#5c3d2e}
.subtitle{text-align:center;color:#8b6f5e;margin-bottom:1.5rem;font-size:1.1rem}
.search-box{display:flex;gap:.5rem;margin-bottom:1.5rem}
.search-box input{flex:1;padding:.65rem 1rem;font-size:1.1rem;border:2px solid #c4a882;border-radius:6px;background:#fffdf7;font-family:inherit;color:#3b2a1a}
.search-box input:focus{outline:none;border-color:#8b6f5e}
.search-box button{padding:.65rem 1.25rem;font-size:1.1rem;background:#5c3d2e;color:#f5f0e8;border:none;border-radius:6px;cursor:pointer;font-family:inherit}
.search-box button:hover{background:#7a5440}
.spinner{display:none;text-align:center;padding:2rem;color:#8b6f5e;font-size:1.1rem}
.empty{text-align:center;padding:3rem 1rem;color:#8b6f5e;font-size:1.1rem}
.card{background:#fffdf7;border:1px solid #d9c9b0;border-radius:8px;padding:1.25rem;margin-bottom:1rem;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card h2{font-size:1.2rem;color:#5c3d2e;margin-bottom:.75rem}
.hebrew{direction:rtl;text-align:right;font-family:'Frank Ruhl Libre',serif;font-size:1.35rem;line-height:1.8;margin-bottom:.75rem;color:#2a1a0e}
.english{line-height:1.6;margin-bottom:.75rem}
.meta{display:flex;gap:.75rem;flex-wrap:wrap;align-items:center;font-size:.85rem}
.score{background:#e8dcc8;padding:.2rem .6rem;border-radius:4px;color:#5c3d2e}
.explanation{background:#d4e6d4;padding:.2rem .6rem;border-radius:4px;color:#2e5c3d}
@media(max-width:500px){
  body{padding:1rem .5rem}
  h1{font-size:1.5rem}
  .hebrew{font-size:1.15rem}
}
</style>
</head>
<body>
<div class="container">
  <h1>📜 Torah Source Search</h1>
  <p class="subtitle">Semantic &amp; keyword search over Torah texts</p>
  <div class="search-box">
    <input id="q" type="text" placeholder="Search Torah sources…" aria-label="Search query">
    <button onclick="doSearch()" aria-label="Search">Search</button>
  </div>
  <div id="spinner" class="spinner">Searching…</div>
  <div id="results"><p class="empty">Enter a query to search Torah sources.</p></div>
</div>
<script>
const q=document.getElementById('q'),results=document.getElementById('results'),spinner=document.getElementById('spinner');
q.addEventListener('keydown',e=>{if(e.key==='Enter')doSearch()});
async function doSearch(){
  const query=q.value.trim();
  if(!query)return;
  results.innerHTML='';spinner.style.display='block';
  try{
    const r=await fetch('/search?q='+encodeURIComponent(query)+'&limit=20');
    const data=await r.json();
    spinner.style.display='none';
    if(!data.length){results.innerHTML='<p class="empty">No results found.</p>';return}
    results.innerHTML=data.map(d=>`<div class="card">
      <h2>${esc(d.ref)}</h2>
      ${d.hebrew?`<div class="hebrew">${esc(d.hebrew)}</div>`:''}
      ${d.english?`<div class="english">${esc(d.english)}</div>`:''}
      <div class="meta">
        <span class="score">Score: ${d.score.toFixed(2)}</span>
        ${d.explanation?`<span class="explanation">${esc(d.explanation)}</span>`:''}
      </div>
    </div>`).join('');
  }catch(e){spinner.style.display='none';results.innerHTML='<p class="empty">Search failed. Is the backend running?</p>'}
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
</script>
</body>
</html>
